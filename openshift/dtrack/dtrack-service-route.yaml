apiVersion: v1
kind: Service
metadata:
  name: dtrack-apiserver
  labels:
    app: dtrack
    component: apiserver
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: dtrack
    component: apiserver
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dtrack-apiserver
  labels:
    app: dtrack
    component: apiserver
spec:
  host: api-dtrack.example.com # Placeholder: Replace with actual domain
  to:
    kind: Service
    name: dtrack-apiserver
---
apiVersion: v1
kind: Service
metadata:
  name: dtrack-frontend
  labels:
    app: dtrack
    component: frontend
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: dtrack
    component: frontend
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dtrack-frontend
  labels:
    app: dtrack
    component: frontend
spec:
  host: frontend-dtrack.example.com # Placeholder: Replace with actual domain
  to:
    kind: Service
    name: dtrack-frontend
