apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  labels:
    app: dtrack-postgres
type: Opaque
stringData:
  # Placeholder: Replace with strong randomly generated passwords
  POSTGRES_USER: "dtrack"
  POSTGRES_PASSWORD: "dtrack_password"
  POSTGRES_DB: "dtrack"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: dtrack-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dtrack-postgres
  template:
    metadata:
      labels:
        app: dtrack-postgres
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          # Standard postgres image might require custom init logic for non-root execution
          # Use bitnami/postgresql which works well as non-root on OpenShift
          image: docker.io/bitnami/postgresql:15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /bitnami/postgresql
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: dtrack-postgres
spec:
  ports:
    - port: 5432
  selector:
    app: dtrack-postgres
