apiVersion: v1
kind: ConfigMap
metadata:
  name: sbom-scanner-config
  labels:
    app: sbom-scanner
data:
  DTRACK_URL: "http://dtrack-api:8080" # Placeholder: internal service URL or route
  # Additional configuration variables here
---
apiVersion: v1
kind: Secret
metadata:
  name: sbom-scanner-secret
  labels:
    app: sbom-scanner
type: Opaque
stringData:
  # Placeholder: Replace with actual values using a secure method or during deployment
  DTRACK_API_KEY: "replace_with_actual_api_key"
  GIT_TOKEN: "replace_with_actual_git_token"
